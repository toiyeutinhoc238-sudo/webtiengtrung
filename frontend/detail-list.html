<!DOCTYPE html>
<html lang="vi" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Danh Sách Chi Tiết Từ Vựng - HọcTiếngTrung.v3</title>
  
  <!-- Font and Stylesheets -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@400;500;600;700;800&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  
  <!-- Main Styling System -->
  <link rel="stylesheet" href="/src/style.css">
  
  <style>
    body {
      background-color: #0b0f19;
      color: #f3f4f6;
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      padding: 32px 16px;
    }
    
    .container {
      max-width: 1200px;
      margin: 0 auto;
    }
    
    .header-panel {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      flex-wrap: wrap;
      gap: 16px;
    }
    
    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-family: 'Outfit', sans-serif;
      font-weight: 800;
      font-size: 1.6rem;
      background: linear-gradient(135deg, #3b82f6 0%, #10b981 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    
    .search-filter-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    
    .search-input-wrapper {
      position: relative;
      flex-grow: 1;
      max-width: 450px;
    }
    
    .search-input-wrapper i {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
    }
    
    .search-input-wrapper input {
      width: 100%;
      padding: 10px 14px 10px 40px;
      font-size: 0.95rem;
      border-radius: var(--radius-md);
      border: 1px solid var(--border-glass);
      background: rgba(0, 0, 0, 0.2);
      color: var(--text-primary);
      outline: none;
      transition: border-color 0.2s;
    }
    
    .search-input-wrapper input:focus {
      border-color: var(--accent-blue);
    }
    
    .active-filters-badges {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }
    
    .filter-badge {
      background: rgba(59, 130, 246, 0.1);
      color: var(--accent-blue);
      border: 1px solid rgba(59, 130, 246, 0.25);
      padding: 4px 12px;
      font-size: 0.85rem;
      font-weight: 600;
      border-radius: var(--radius-sm);
    }
    
    /* Pagination styling */
    .pagination-container {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 24px;
      flex-wrap: wrap;
      gap: 16px;
    }
    
    .pagination-info {
      font-size: 0.9rem;
      color: var(--text-secondary);
    }
    
    .pagination-buttons {
      display: flex;
      gap: 6px;
    }
    
    .page-btn {
      padding: 6px 12px;
      border: 1px solid var(--border-glass);
      background: rgba(255,255,255,0.03);
      color: var(--text-secondary);
      border-radius: var(--radius-sm);
      cursor: pointer;
      font-weight: 500;
      font-size: 0.9rem;
      transition: all 0.2s;
    }
    
    .page-btn:hover:not(:disabled) {
      border-color: var(--accent-blue);
      color: var(--text-primary);
      background: rgba(59, 130, 246, 0.05);
    }
    
    .page-btn.active {
      background: var(--accent-blue);
      color: white;
      border-color: var(--accent-blue);
    }
    
    .page-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .toast-popup {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: rgba(15, 23, 42, 0.95);
      backdrop-filter: blur(12px);
      border: 1px solid var(--border-glass);
      border-left: 4px solid var(--accent-blue);
      padding: 12px 24px;
      border-radius: var(--radius-md);
      font-weight: 500;
      color: var(--text-primary);
      box-shadow: var(--shadow-lg);
      z-index: 1000;
      transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    
    .toast-popup.show {
      transform: translateX(-50%) translateY(0);
    }

    .filter-select {
      padding: 10px 14px;
      border-radius: var(--radius-md);
      border: 1px solid var(--border-glass);
      background: rgba(15, 23, 42, 0.6);
      backdrop-filter: blur(8px);
      color: var(--text-primary);
      outline: none;
      font-size: 0.9rem;
      min-width: 160px;
      cursor: pointer;
      font-family: inherit;
      transition: border-color 0.2s, background-color 0.2s;
    }

    .filter-select:focus {
      border-color: var(--accent-blue);
      background: rgba(15, 23, 42, 0.85);
    }

    .filter-select option {
      background-color: #0b0f19;
      color: var(--text-primary);
    }
  </style>
</head>
<body>
  <div class="container">
    
    <!-- Top Header -->
    <div class="header-panel glass-panel" style="padding: 24px;">
      <div>
        <div class="logo">
          <i class="fa-solid fa-graduation-cap"></i> HọcTiếngTrung.v3
        </div>
        <h1 style="font-family: var(--font-display); font-size: 1.5rem; font-weight: 800; margin: 8px 0 2px 0;">Danh Sách Từ Vựng Đầy Đủ</h1>
        <p style="color: var(--text-secondary); font-size: 0.85rem; margin: 0;">Trang học tập tập trung hiển thị toàn bộ từ vựng theo cấu hình lọc của bạn.</p>
      </div>
      
      <div style="display: flex; gap: 8px;">
        <button id="export-excel-btn" class="btn btn-secondary btn-sm" style="display: flex; align-items: center; gap: 6px; padding: 10px 16px; background: rgba(16, 185, 129, 0.15); color: var(--accent-teal); border: 1px solid rgba(16, 185, 129, 0.3);">
          <i class="fa-solid fa-file-excel"></i> Xuất Excel
        </button>
        <button onclick="window.close()" class="btn btn-primary btn-sm" style="display: flex; align-items: center; gap: 6px; padding: 10px 16px; background: var(--accent-blue); color: white;">
          Đóng cửa sổ
        </button>
      </div>
    </div>
    
    <!-- Search and Active Filters -->
    <div class="glass-panel" style="padding: 24px; margin-bottom: 24px;">
      <div class="search-filter-row" style="display: flex; justify-content: space-between; align-items: center; gap: 16px; flex-wrap: wrap; width: 100%;">
        <div class="search-input-wrapper" style="flex-grow: 1; max-width: 400px; position: relative;">
          <i class="fa-solid fa-magnifying-glass"></i>
          <input type="text" id="detail-search-input" placeholder="Tìm kiếm nhanh trong danh sách này...">
        </div>
        
        <div class="filter-controls" style="display: flex; gap: 12px; align-items: center; flex-wrap: wrap;">
          <select id="detail-level-select" class="filter-select">
            <option value="all">Cấp độ: Tất cả HSK</option>
            <option value="1">Cấp độ: HSK 1</option>
            <option value="2">Cấp độ: HSK 2</option>
            <option value="3">Cấp độ: HSK 3</option>
            <option value="4">Cấp độ: HSK 4</option>
            <option value="5">Cấp độ: HSK 5</option>
            <option value="6">Cấp độ: HSK 6</option>
          </select>

          <select id="detail-status-select" class="filter-select">
            <option value="all">Trạng thái: Tất cả</option>
            <option value="memorized">Trạng thái: Đã học thuộc</option>
            <option value="unmemorized">Trạng thái: Chưa thuộc</option>
            <option value="starred">Trạng thái: Yêu thích</option>
            <option value="wrong">Trạng thái: Từ làm sai</option>
            <option value="custom">Trạng thái: Từ tự thêm</option>
          </select>

          <span id="badge-custom" class="filter-badge" style="display: none;">Sổ tay cá nhân</span>
        </div>
      </div>
      
      <!-- Table View -->
      <div class="filtered-words-table-wrapper" style="overflow-x: auto; border: 1px solid var(--border-glass); border-radius: var(--radius-md);">
        <table class="custom-words-table" style="width: 100%; border-collapse: collapse; text-align: left; font-size: 0.95rem;">
          <thead>
            <tr style="border-bottom: 2px solid var(--border-glass); font-weight: 600; color: var(--text-muted); font-family: var(--font-display); background: rgba(0,0,0,0.25);">
              <th style="padding: 12px; width: 140px;">Chữ Hán</th>
              <th style="padding: 12px; width: 150px;">Pinyin</th>
              <th style="padding: 12px;">Nghĩa tiếng Việt</th>
              <th style="padding: 12px; width: 140px;">Cấp độ</th>
              <th style="padding: 12px; width: 160px; text-align: center;">Thao tác nhanh</th>
            </tr>
          </thead>
          <tbody id="detail-words-table-rows">
            <tr>
              <td colspan="5" style="text-align: center; padding: 48px; color: var(--text-muted);">
                <i class="fa-solid fa-spinner fa-spin" style="font-size: 1.5rem; margin-bottom: 12px; color: var(--accent-blue);"></i>
                <div>Đang tải dữ liệu từ vựng...</div>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
      
      <!-- Pagination -->
      <div class="pagination-container">
        <div class="pagination-info" id="pagination-info">
          Hiển thị 0 - 0 trong tổng số 0 từ vựng
        </div>
        <div class="pagination-buttons" id="pagination-buttons">
          <!-- Page buttons will go here -->
        </div>
      </div>
      
    </div>
    
  </div>

  <!-- Toast Notification element -->
  <div id="toast" class="toast-popup">Thông báo</div>

  <script>
    // --- STATE MANAGEMENT ---
    let vocabList = [];
    let filteredList = [];
    let currentUser = null;
    
    // Pagination parameters
    const pageSize = 50;
    let currentPage = 1;
    
    // Resolve dynamic API URL
    const API_BASE_URL = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' || window.location.hostname === ''
      ? 'http://localhost:5000'
      : 'https://webtiengtrung.onrender.com';
      
    // Auth headers builder
    function getAuthHeaders(customHeaders = {}) {
      const token = localStorage.getItem('session_token');
      const headers = { ...customHeaders };
      if (token) {
        headers['Authorization'] = `Bearer ${token}`;
        headers['x-session-token'] = token;
      }
      return headers;
    }

    // Retrieve active logged in user from localStorage
    const savedUser = localStorage.getItem('user');
    if (savedUser) {
      try {
        currentUser = JSON.parse(savedUser);
      } catch (e) {
        localStorage.removeItem('user');
      }
    }

    // Parse URL query parameters to apply filters
    const urlParams = new URLSearchParams(window.location.search);
    let activeLevel = urlParams.get('level') || 'all';
    let activeStatus = urlParams.get('status') || 'all';
    const initialSearch = urlParams.get('search') || '';
    const customCategory = urlParams.get('customCategory') || '';
    
    // Document DOM load event listener
    document.addEventListener('DOMContentLoaded', () => {
      // Set initial search input value
      const searchInput = document.getElementById('detail-search-input');
      if (searchInput) {
        searchInput.value = initialSearch;
        searchInput.addEventListener('input', handleSearchInput);
      }

      // Initialize dropdown selections
      const levelSelect = document.getElementById('detail-level-select');
      if (levelSelect) {
        levelSelect.value = activeLevel;
        levelSelect.addEventListener('change', (e) => {
          activeLevel = e.target.value;
          applyFilters();
        });
      }

      const statusSelect = document.getElementById('detail-status-select');
      if (statusSelect) {
        statusSelect.value = activeStatus;
        statusSelect.addEventListener('change', (e) => {
          activeStatus = e.target.value;
          applyFilters();
        });
      }
      
      // Update custom filters badges UI
      updateFiltersBadges();
      
      // Fetch vocabulary data
      fetchVocabulary();

      // Excel Export Button Handler
      const exportExcelBtn = document.getElementById('export-excel-btn');
      if (exportExcelBtn) {
        exportExcelBtn.addEventListener('click', exportToExcel);
      }
    });

    function updateFiltersBadges() {
      const customEl = document.getElementById('badge-custom');
      if (customEl) {
        if (customCategory) {
          customEl.textContent = `Sổ tay: ${customCategory}`;
          customEl.style.display = 'inline-block';
        } else {
          customEl.style.display = 'none';
        }
      }
    }

    function exportToExcel() {
      const wordsToExport = filteredList;
      if (wordsToExport.length === 0) {
        showToast('Không có từ vựng nào để xuất!', true);
        return;
      }

      // Prepend UTF-8 BOM \uFEFF so Excel reads Vietnamese/Chinese characters correctly.
      let csvContent = "Chữ Hán,Pinyin,Nghĩa tiếng Việt,Cấp độ,Học thuộc,Yêu thích\n";

      wordsToExport.forEach(w => {
        // Escape commas and quotes inside fields to prevent broken CSV columns
        const escapeCSV = (text) => {
          if (text === null || text === undefined) return '';
          let val = text.toString().replace(/"/g, '""'); // escape double quotes
          if (val.includes(',') || val.includes('\n') || val.includes('"')) {
            val = `"${val}"`; // wrap in quotes if commas/newlines/quotes exist
          }
          return val;
        };

        const word = escapeCSV(w.word);
        const pinyin = escapeCSV(w.pinyin);
        const meaning = escapeCSV(w.meaning);
        const level = escapeCSV(w.isCustom ? 'Cá nhân' : 'HSK ' + w.level);
        const memorized = escapeCSV(w.isMemorized ? 'Đã thuộc' : 'Chưa thuộc');
        const starred = escapeCSV(w.isStarred ? 'Yêu thích' : 'Không');

        csvContent += `${word},${pinyin},${meaning},${level},${memorized},${starred}\n`;
      });

      const blob = new Blob(['\uFEFF' + csvContent], { type: 'text/csv;charset=utf-8;' });
      const url = URL.createObjectURL(blob);
      
      const a = document.createElement('a');
      a.href = url;
      
      let fileName = 'danh_sach_tu_vung';
      if (activeLevel !== 'all') fileName += `_hsk${activeLevel}`;
      if (activeStatus !== 'all') fileName += `_${activeStatus}`;
      fileName += '.csv';
      
      a.download = fileName;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
      showToast('Đã xuất danh sách thành công! 📊');
    }

    async function fetchVocabulary() {
      try {
        const response = await fetch(API_BASE_URL + '/api/vocabulary', {
          headers: getAuthHeaders(),
          credentials: 'include'
        });
        if (!response.ok) throw new Error('Không thể tải từ vựng');
        vocabList = await response.json();
        
        // Load guest progress if not logged in
        if (!currentUser) {
          const guestProgress = JSON.parse(localStorage.getItem('guest_progress') || '{}');
          vocabList = vocabList.map(w => {
            const state = guestProgress[w.id];
            return {
              ...w,
              isMemorized: state ? !!state.isMemorized : !!w.isMemorized,
              isStarred: state ? !!state.isStarred : !!w.isStarred,
              isWrong: state ? !!state.isWrong : !!w.isWrong
            };
          });
        }
        
        applyFilters();
      } catch (err) {
        console.error('Fetch error:', err);
        showToast('Lỗi tải dữ liệu từ máy chủ. Đang thử dùng dữ liệu dự phòng...', true);
        
        // Offline fallback guest sync
        if (!currentUser) {
          const guestProgress = JSON.parse(localStorage.getItem('guest_progress') || '{}');
          vocabList = vocabList.map(w => {
            const state = guestProgress[w.id];
            return {
              ...w,
              isMemorized: state ? !!state.isMemorized : !!w.isMemorized,
              isStarred: state ? !!state.isStarred : !!w.isStarred,
              isWrong: state ? !!state.isWrong : !!w.isWrong
            };
          });
        }
        applyFilters();
      }
    }

    function handleSearchInput(e) {
      applyFilters();
    }

    function applyFilters() {
      const searchVal = document.getElementById('detail-search-input').value.toLowerCase().trim();
      
      filteredList = vocabList.filter(w => {
        // Custom category filter
        if (customCategory && (!w.isCustom || w.category !== customCategory)) {
          return false;
        }
        
        // HSK Level filter
        if (activeLevel !== 'all' && w.level.toString() !== activeLevel) {
          return false;
        }
        
        // Status filter
        if (activeStatus === 'memorized' && !w.isMemorized) return false;
        if (activeStatus === 'unmemorized' && w.isMemorized) return false;
        if (activeStatus === 'starred' && !w.isStarred) return false;
        if (activeStatus === 'wrong' && !w.isWrong) return false;
        if (activeStatus === 'custom' && !w.isCustom) return false;
        
        // Search filter
        if (searchVal) {
          const matchWord = w.word.includes(searchVal);
          const matchPinyin = w.pinyin.toLowerCase().includes(searchVal);
          const matchMeaning = w.meaning.toLowerCase().includes(searchVal);
          return matchWord || matchPinyin || matchMeaning;
        }
        
        return true;
      });
      
      currentPage = 1;
      renderTable();
    }

    function renderTable() {
      const tbody = document.getElementById('detail-words-table-rows');
      if (!tbody) return;
      
      tbody.innerHTML = '';
      
      if (filteredList.length === 0) {
        tbody.innerHTML = `
          <tr>
            <td colspan="5" style="text-align: center; padding: 48px; color: var(--text-muted); font-style: italic;">
              Không có từ vựng nào khớp với bộ lọc hiện tại.
            </td>
          </tr>
        `;
        document.getElementById('pagination-info').textContent = 'Hiển thị 0 - 0 trong tổng số 0 từ vựng';
        document.getElementById('pagination-buttons').innerHTML = '';
        return;
      }
      
      // Calculate pagination boundaries
      const totalWords = filteredList.length;
      const totalPages = Math.ceil(totalWords / pageSize);
      if (currentPage > totalPages) currentPage = totalPages;
      if (currentPage < 1) currentPage = 1;
      
      const startIdx = (currentPage - 1) * pageSize;
      const endIdx = Math.min(startIdx + pageSize, totalWords);
      
      const wordsToDisplay = filteredList.slice(startIdx, endIdx);
      
      wordsToDisplay.forEach(w => {
        const tr = document.createElement('tr');
        tr.style.borderBottom = '1px solid var(--border-glass)';
        tr.innerHTML = `
          <td style="font-family: var(--font-chinese); font-size: 1.3rem; font-weight: 500; padding: 14px 12px;">${w.word}</td>
          <td style="font-family: var(--font-display); padding: 14px 12px; color: var(--accent-teal); font-weight: 500;">${w.pinyin}</td>
          <td style="padding: 14px 12px;">${w.meaning}</td>
          <td style="padding: 14px 12px;"><span class="badge badge-level" style="margin: 0;">${w.isCustom ? 'Cá nhân ✏️' : 'HSK ' + w.level}</span></td>
          <td style="padding: 14px 12px; text-align: center;">
            <div style="display: flex; gap: 8px; justify-content: center; align-items: center;">
              <button class="circle-btn speak-row-btn" data-word="${w.word}" title="Nghe phát âm" style="width: 34px; height: 34px; font-size: 0.85rem; background: rgba(59, 130, 246, 0.1); color: var(--accent-blue); display: flex; align-items: center; justify-content: center;">
                <i class="fa-solid fa-volume-high"></i>
              </button>
              <button class="circle-btn star-row-btn ${w.isStarred ? 'active' : ''}" data-id="${w.id}" title="Yêu thích" style="width: 34px; height: 34px; font-size: 0.85rem; display: flex; align-items: center; justify-content: center;">
                <i class="fa-solid fa-star"></i>
              </button>
              <button class="circle-btn check-row-btn ${w.isMemorized ? 'active' : ''}" data-id="${w.id}" title="Đã thuộc" style="width: 34px; height: 34px; font-size: 0.85rem; display: flex; align-items: center; justify-content: center;">
                <i class="fa-solid fa-circle-check"></i>
              </button>
            </div>
          </td>
        `;
        tbody.appendChild(tr);
      });
      
      // Update pagination info
      document.getElementById('pagination-info').textContent = `Hiển thị ${startIdx + 1} - ${endIdx} trong tổng số ${totalWords} từ vựng`;
      
      // Draw pagination buttons
      renderPaginationButtons(totalPages);
      
      // Bind Speak Events
      tbody.querySelectorAll('.speak-row-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          const word = btn.getAttribute('data-word');
          speakText(word);
        });
      });
      
      // Bind Star Toggles
      tbody.querySelectorAll('.star-row-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          const id = parseInt(btn.getAttribute('data-id'));
          toggleWordStarred(id, btn);
        });
      });
      
      // Bind Check Toggles
      tbody.querySelectorAll('.check-row-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          const id = parseInt(btn.getAttribute('data-id'));
          toggleWordMemorized(id, btn);
        });
      });
    }

    function renderPaginationButtons(totalPages) {
      const container = document.getElementById('pagination-buttons');
      if (!container) return;
      
      container.innerHTML = '';
      
      // Prev Button
      const prevBtn = document.createElement('button');
      prevBtn.className = 'page-btn';
      prevBtn.innerHTML = '<i class="fa-solid fa-chevron-left"></i>';
      prevBtn.disabled = currentPage === 1;
      prevBtn.addEventListener('click', () => {
        currentPage--;
        renderTable();
      });
      container.appendChild(prevBtn);
      
      // Draw page numbers dynamically (max 5 page numbers)
      const range = 2;
      let startPage = Math.max(1, currentPage - range);
      let endPage = Math.min(totalPages, currentPage + range);
      
      if (startPage > 1) {
        const firstBtn = document.createElement('button');
        firstBtn.className = 'page-btn';
        firstBtn.textContent = '1';
        firstBtn.addEventListener('click', () => {
          currentPage = 1;
          renderTable();
        });
        container.appendChild(firstBtn);
        
        if (startPage > 2) {
          const dots = document.createElement('span');
          dots.textContent = '...';
          dots.style.alignSelf = 'center';
          dots.style.margin = '0 4px';
          dots.style.color = 'var(--text-muted)';
          container.appendChild(dots);
        }
      }
      
      for (let p = startPage; p <= endPage; p++) {
        const pageBtn = document.createElement('button');
        pageBtn.className = `page-btn ${p === currentPage ? 'active' : ''}`;
        pageBtn.textContent = p;
        pageBtn.addEventListener('click', () => {
          currentPage = p;
          renderTable();
        });
        container.appendChild(pageBtn);
      }
      
      if (endPage < totalPages) {
        if (endPage < totalPages - 1) {
          const dots = document.createElement('span');
          dots.textContent = '...';
          dots.style.alignSelf = 'center';
          dots.style.margin = '0 4px';
          dots.style.color = 'var(--text-muted)';
          container.appendChild(dots);
        }
        
        const lastBtn = document.createElement('button');
        lastBtn.className = 'page-btn';
        lastBtn.textContent = totalPages;
        lastBtn.addEventListener('click', () => {
          currentPage = totalPages;
          renderTable();
        });
        container.appendChild(lastBtn);
      }
      
      // Next Button
      const nextBtn = document.createElement('button');
      nextBtn.className = 'page-btn';
      nextBtn.innerHTML = '<i class="fa-solid fa-chevron-right"></i>';
      nextBtn.disabled = currentPage === totalPages;
      nextBtn.addEventListener('click', () => {
        currentPage++;
        renderTable();
      });
      container.appendChild(nextBtn);
    }

    function speakText(text) {
      if (!text) return;
      if (typeof speechSynthesis !== 'undefined') {
        speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'zh-CN';
        utterance.rate = 0.85;
        speechSynthesis.speak(utterance);
      } else {
        showToast('Thiết bị không hỗ trợ đọc âm thanh offline!', true);
      }
    }

    async function toggleWordMemorized(id, btn) {
      const idx = vocabList.findIndex(w => w.id === id);
      if (idx === -1) return;
      
      const oldMemorized = vocabList[idx].isMemorized;
      const nextState = !oldMemorized;

      // Optimistic update
      vocabList[idx].isMemorized = nextState;
      applyFilters();
      showToast(nextState ? 'Đã thuộc từ này! 🎉' : 'Đã chuyển về danh sách cần ôn tập.');
      
      if (!currentUser) {
        const guestProgress = JSON.parse(localStorage.getItem('guest_progress') || '{}');
        if (!guestProgress[id]) guestProgress[id] = {};
        guestProgress[id].isMemorized = nextState;
        localStorage.setItem('guest_progress', JSON.stringify(guestProgress));
        return;
      }

      try {
        const response = await fetch(API_BASE_URL + '/api/vocabulary/toggle-memorized', {
          method: 'POST',
          headers: getAuthHeaders({ 'Content-Type': 'application/json' }),
          body: JSON.stringify({ id }),
          credentials: 'include'
        });
        
        if (response.status === 401) {
          // Rollback local state
          vocabList[idx].isMemorized = oldMemorized;
          applyFilters();

          localStorage.removeItem('user');
          localStorage.removeItem('session_token');
          currentUser = null;
          showToast('Phiên làm việc đã hết hạn. Đang chạy chế độ khách...', true);
          
          const guestProgress = JSON.parse(localStorage.getItem('guest_progress') || '{}');
          if (!guestProgress[id]) guestProgress[id] = {};
          guestProgress[id].isMemorized = !oldMemorized;
          vocabList[idx].isMemorized = !oldMemorized;
          localStorage.setItem('guest_progress', JSON.stringify(guestProgress));
          applyFilters();
          return;
        }

        if (!response.ok) throw new Error();
        const updated = await response.json();
        Object.assign(vocabList[idx], updated);
        applyFilters();
      } catch (err) {
        console.error(err);
        showToast('Lỗi đồng bộ trạng thái!', true);
        
        // Rollback state on error
        vocabList[idx].isMemorized = oldMemorized;
        applyFilters();
      }
    }

          const guestProgress = JSON.parse(localStorage.getItem('guest_progress') || '{}');
          if (!guestProgress[id]) guestProgress[id] = {};

    function showToast(message, isError = false) {
      const toast = document.getElementById('toast');
      if (!toast) return;
      toast.textContent = message;
      toast.style.borderLeftColor = isError ? 'var(--danger)' : 'var(--accent-blue)';
      toast.classList.add('show');
      setTimeout(() => {
        toast.classList.remove('show');
      }, 2500);
    }
  </script>
